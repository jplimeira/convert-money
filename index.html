<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="./style.css">
    <link rel="icon" type="image/png" href="./assets/icon-page.png">
    <title>Convert Money</title>
</head>

<body>
    <img class="logo" src="./assets/logo.gif" alt="logo-convert-money">
    <main>

        <label>
            Converter <b>de</b> <b></b>
            <select>
                <option value="">R$ Real</option>
            </select>
        </label>

        <label>
            <b>Para</b>
            <select id="currency-chosen">
                <option value="usd">US$ Dólar</option>
                <option value="eur">€ Euro</option>
                <option value="gbp">£ Libra</option>
                <option value="btc">₿ Bitcoin</option>
            </select>
        </label>

        <label for="">
            <b>Valor</b>
            <input class="input-currency" placeholder="Ex: R$ 10.000,00">
        </label>

        <button class="convert-button">Converter</button>

        <section>
            <div class="currency-box">
                <img src="./assets/real.png" alt="logo-moeda-a-converter">
                <p class="currency">Real</p>
                <P class="currency-value-to-convert">R$ 0,00</P>
            </div>

            <img class="arrow" src="./assets/arrow.png" alt="arrow">

            <div class="currency-box">
                <img src="./assets/dolar.png" id="logo-value-to-convert" alt="logo-moeda-covertida">
                <p class="currency" id="currency-name">Dólar</p>
                <P class="currency-value" id="">US$ 0,00</P>
            </div>
        </section>
    </main>

</body>
<script src="./scripts.js"></script>

</html>
