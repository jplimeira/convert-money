<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="./style.css">
    <link rel="icon" type="image/png" href="./assets/icon-page.png">
    <title>Convert Money</title>
</head>

<body>
    <img src="./assets/logo.gif" alt="logo-convert-money">
    <main>

        <label for="">
            Converter de <b>de</b> <b></b>
            <select name="" id="">
                <option value="">R$ Real brasileiro</option>
            </select>
        </label>

        <label for="">
            <b>Para</b>
            <select name="" id="">
                <option value="">R$ Real</option>
                <option value="">US$ Dólar</option>
                <option value="">€ Euro</option>
            </select>
        </label>

        <label for="">
            <b>Valor</b>
            <input €placeholder="Ex: 10.000,00">
        </label>

        <button>Converter</button>

        <section>
            <div>
                <img src="./assets/real.png" alt="logo-moeda-a-converter">
                <p>Real</p>
                <P>R$ 0,00</P>
            </div>

            <img src="./assets/arrow.png" alt="arrow">

            <div>
                <img src="./assets/dolar.png" alt="logo-moeda-covertida">
                <p>Dólar</p>
                <P>US$ 0,00</P>
            </div>
        </section>
    </main>

</body>
<script src="./script.js"></script>

</html>
